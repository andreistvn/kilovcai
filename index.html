<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive digital museum of lost artifacts.">
    <title>kilovcai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside id="side-nav" aria-label="site links">
    <h1>> > INDEX</h1>
    <a href="#">> index</a>

  <div id="sidebar-media">

  </div>

  <aside id="right-sidebar" aria-label="right visual panel">
    <img id="rightbar-gif" src="./assets/rightbar/rotate.gif" alt="Rotating decorative animation">
  </aside>

  <main id="museum-floor">
    <div id="desktop-icons" aria-label="closed artifacts"></div>
  </main>

  <footer class="webcore-footer" aria-label="sliding footer images">
    <div class="footer-scroll-container">
      <div class="footer-scroll-track">
        <img class="footer-image" src="./assets/footer/footer.jpg" alt="Footer image 1">
        <img class="footer-image" src="./assets/footer/footer1.jpg" alt="Footer image 2">
        <img class="footer-image" src="./assets/footer/footer2.jpg" alt="Footer image 3">
        <img class="footer-image" src="./assets/footer/footer3.jpg" alt="Footer image 4">
        <img class="footer-image" src="./assets/footer/footer4.jpg" alt="Footer image 5">
        <img class="footer-image" src="./assets/footer/footer5.gif" alt="Footer image 6">
        <img class="footer-image" src="./assets/footer/footer6.jpg" alt="Footer image 7">

        <img class="footer-image" src="./assets/footer/footer.jpg" alt="Footer image 8">
        <img class="footer-image" src="./assets/footer/footer1.jpg" alt="Footer image 9">
        <img class="footer-image" src="./assets/footer/footer2.jpg" alt="Footer image 10">
        <img class="footer-image" src="./assets/footer/footer3.jpg" alt="Footer image 11">
        <img class="footer-image" src="./assets/footer/footer4.jpg" alt="Footer image 12">
        <img class="footer-image" src="./assets/footer/footer5.gif" alt="Footer image 13">
        <img class="footer-image" src="./assets/footer/footer6.jpg" alt="Footer image 14">
      </div>
    </div>
  </footer>

  <button id="wake-toggle" aria-pressed="false">>> [ SLEEP ]</button>

  <div id="status-bar" aria-live="polite">
    <span>[ SYSTEM OK ]</span>
    <span id="status-time">--:--:--</span>
  </div>
    
    <!-- Exhibit Data (embedded for local testing) -->
    <script type="application/json" id="exhibits-data">
    {
      "exhibits": [
        {
          "id": "IMG_PI?_001",
          "title": "[ AFTERIMAGE_01 ]",
          "description": "it's probably just a dead pixel on a screen i haven't looked at in years. it doesn't mean anything. i tried to delete the folder but the button wouldn't respond, so it just sits there. rotting in the cache. staring doesn't make it real; it's just noise that got organized by accident. a complete waste of electricity. i don't even remember why i saved this. it's just occupying space until the battery dies. don't expect it to move. it already forgot how.",
          "type": "image",
          "content": "./assets/images/takopi.webp",
          "pos": {"x": 40, "y": 42},
          "searchTags": ["1bit", "atkinson", "anime webcore", "lain", "portrait", "japanese typography"],
          "metadata": {"date": "2016-07-06", "source": "wired tape rip", "dimensions": "480x720", "bitDepth": "1-bit", "dither": "Atkinson"}
        },
        {
          "id": "TXT_CORRUPTED_V02",
          "title": "[ BOOT_LOG_TXT ]",
          "description": "Boot log from an orphaned terminal in monochrome mode.",
          "type": "text",
          "content": "> booting node-09\n> loading archive index...\n> serial link: established\n> user: lain\n> status: awake\n> _ _ _\n[END FRAME]",
          "pos": {"x": 360, "y": 258},
          "metadata": {"date": "2000-01-02", "source": "node-09", "format": "plaintext"}
        },
        {
          "id": "IMG_TIMELESS_A",
          "title": "[ accept_let_go ]",
          "description": "i'm tired of the streetlights. they just keep flickering like nothing happened. it's infuriating how the world just expects you to move on while the impact is still echoing in my teeth. they tell you to let go like it's as easy as dropping a glass, but they don't tell you about the mess it leaves on the floor. i'd rather keep crashing into the same wall forever than face the silence of the other side. letting go isn't a choice; it's just a slow-motion wreck that never actually finishes. i hope nobody is watching the loop. i hope nobody is waiting for me to walk away.",
          "type": "image",
          "content": "./assets/images/footbridge.png",
          "pos": {"x": 610, "y": 120},
          "searchTags": ["1bit", "floyd-steinberg", "tamagotchi", "pixel art", "square", "webcore"],
          "metadata": {"date": "unknown", "source": "pocket pet archive", "dimensions": "640x640", "bitDepth": "1-bit", "dither": "Floyd-Steinberg"}
        },
        {
          "id": "AUD_TAPE_47",
          "title": "[ YUUGATA_NO_PIANO_V.2015 ]",
          "description": "A loop that does not require an audience. The piano repeats because it was programmed to, not because it was heard. Recorded during the hour when the light fails. If the file corrupts, the melody remains in the static. Do not seek the origin; the origin has already disconnected.",
          "type": "audio",
          "content": "https://cdn.jsdelivr.net/gh/andreistvn/kilovcai@main/assets/mp3/%E5%A4%95%E6%96%B9%E3%81%AE%E3%83%94%E3%82%A2%E3%83%8E%20-%202015remaster.mp3",
          "pos": {"x": 60, "y": 430},
          "metadata": {"date": "unknown", "source": "unmarked cassette", "duration": "1:47", "condition": "degraded"}
        },
        {
          "id": "TXT_DIARY_FRAGMENT",
          "title": "[ FIELD_NOTE_05 ]",
          "description": "Handwritten field note reconstructed into plain text.",
          "type": "text",
          "content": "No shadows today.\nOnly outlines.\nOnly static.\nOnly the hum behind the monitor.\n\nif this reaches you:\n>> do not disconnect.",
          "pos": {"x": 430, "y": 50},
          "metadata": {"date": "2000-10-19", "source": "field notebook", "pages": "05/12"}
        }
      ]
    }
    </script>
    
    <!-- The Engine: reads exhibits data and builds the museum -->
    <script src="js/engine.js"></script>
  <!-- Audio Cache: decode hotlinked MP3s into memory for jitter-free playback -->
  <script src="js/audio-cache.js"></script>


    <!-- Cursor Sparkles: retro trail effect -->
    <script src="js/cursor.js"></script>

    <!-- Compatibility gate: block mobile/small viewport access -->
    <script src="js/compat.js"></script>

    <!-- Effects: subliminal timed glitch events for Yuugata no Piano -->
    <script src="js/effects.js"></script>
    
    <!-- Interaction Handler: dragging, focusing, fullscreen, closing -->
    <script src="js/interaction.js"></script>
</body>
</html>
